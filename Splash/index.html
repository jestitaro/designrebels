<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSMob Splash — ruta sobre mapa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --screen-w: 375px;
      --screen-h: 812px;
      --phone-bg: #080912;
      --phone-border: #242736;
      --splash-violet: #5437c7;
      --splash-deep: #321b8b;
      --splash-blue: #3976f1;
      --map-opacity: .72;
      --route-delay: 620ms;
      --route-duration: 1650ms;
      --logo-delay: 2050ms;
      --logo-duration: 520ms;
      --intro-duration: 520ms;
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 50% 12%, rgba(84, 55, 199, .26), transparent 34%),
        linear-gradient(180deg, #121522 0%, #070810 100%);
      color: #f7f7fb;
      display: grid;
      place-items: center;
      padding: 28px 16px;
    }

    .demo {
      display: grid;
      grid-template-columns: minmax(0, auto) minmax(260px, 360px);
      align-items: center;
      gap: 32px;
      width: min(920px, 100%);
    }

    .phone {
      width: min(var(--screen-w), 92vw);
      aspect-ratio: 375 / 812;
      padding: 10px;
      border-radius: 52px;
      background: linear-gradient(145deg, #11131e, #03040a);
      box-shadow:
        0 0 0 1px var(--phone-border),
        0 16px 50px rgba(0,0,0,.55),
        inset 0 1px 0 rgba(255,255,255,.08);
      position: relative;
      isolation: isolate;
    }

    .phone::before {
      content: "";
      position: absolute;
      top: 18px;
      left: 50%;
      width: 96px;
      height: 25px;
      transform: translateX(-50%);
      border-radius: 0 0 16px 16px;
      background: #070810;
      z-index: 5;
      box-shadow: 0 1px 0 rgba(255,255,255,.08);
    }

    .screen {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 42px;
      background: #2a1878;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
    }

    .splash {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 58% 63%, rgba(82, 151, 255, .45), transparent 25%),
        radial-gradient(circle at 28% 92%, rgba(57, 118, 241, .64), transparent 30%),
        linear-gradient(176deg, var(--splash-violet) 0%, var(--splash-deep) 46%, var(--splash-blue) 100%);
    }

    .splash::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent 0 97%, rgba(255,255,255,.04) 97% 100%),
        linear-gradient(0deg, transparent 0 97%, rgba(255,255,255,.035) 97% 100%);
      background-size: 32px 32px;
      opacity: .18;
      transform: perspective(540px) rotateX(62deg) translateY(210px) scale(1.25);
      transform-origin: 50% 100%;
      pointer-events: none;
    }

    .splash::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.10), transparent 30%, rgba(24, 91, 221, .16) 100%);
      pointer-events: none;
    }

    .map-stage {
      position: absolute;
      left: -60%;
      bottom: -8%;
      width: 240%;
      opacity: 0;
      transform: translateY(22px) scale(1.015);
      animation: mapIn var(--intro-duration) ease-out 120ms forwards;
      z-index: 1;
    }

    .map-stage svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }

    .roads-fill {
      fill: rgba(255,255,255,var(--map-opacity));
      fill-rule: nonzero;
      opacity: .5;
    }

    .roads-stroke {
      fill: none;
      stroke: rgba(255,255,255,.14);
      stroke-width: 10;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* La ruta se dibuja dentro del mismo SVG/viewBox que el mapa.
       Así no se descalibra: mapa y trayecto comparten coordenadas, escala y posición. */
    .route-track {
      fill: none;
      stroke: rgba(255,255,255,.18);
      stroke-width: 58;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .route-active {
      fill: none;
      stroke: #fff;
      stroke-width: 38;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: url(#routeGlow);
      stroke-dasharray: var(--route-length, 1);
      stroke-dashoffset: var(--route-length, 1);
      animation: drawRoute var(--route-duration) cubic-bezier(.68,.02,.2,1) var(--route-delay) forwards;
    }

    .route-dot {
      opacity: 0;
      fill: #fff;
      filter: url(#dotGlow);
    }

    .destination-pulse {
      opacity: 0;
      fill: none;
      stroke: rgba(255,255,255,.8);
      stroke-width: 11;
      transform-origin: 1602.67px 379.223px;
      animation: pulsePoint 900ms ease-out var(--pulse-delay, 1800ms) forwards;
    }

    .brand {
      position: absolute;
      top: clamp(96px, 15.5%, 132px);
      left: 50%;
      width: 145px;
      transform: translate(-50%, 14px) scale(.96);
      opacity: 0;
      z-index: 3;
      filter: drop-shadow(0 18px 28px rgba(18, 6, 82, .40));
      animation: logoIn var(--logo-duration) cubic-bezier(.18,.89,.32,1.28) var(--logo-delay) forwards;
    }

    .brand svg {
      display: block;
      width: 100%;
      height: auto;
    }

    .brand-halo {
      position: absolute;
      top: calc(clamp(96px, 15.5%, 132px) + 45px);
      left: 50%;
      width: 170px;
      height: 170px;
      border-radius: 999px;
      transform: translate(-50%, -50%) scale(.8);
      background: radial-gradient(circle, rgba(255,255,255,.18), transparent 65%);
      opacity: 0;
      z-index: 2;
      animation: haloIn 680ms ease-out 1880ms forwards;
      pointer-events: none;
    }

    .home-indicator {
      position: absolute;
      left: 50%;
      bottom: 10px;
      width: 116px;
      height: 4px;
      border-radius: 999px;
      transform: translateX(-50%);
      background: rgba(255,255,255,.38);
      z-index: 10;
    }

    .caption {
      align-self: center;
      color: #d7d9ec;
    }

    .caption h1 {
      margin: 0 0 10px;
      font-size: clamp(20px, 3vw, 28px);
      line-height: 1.15;
    }

    .caption p {
      margin: 0 0 14px;
      font-size: 14px;
      line-height: 1.55;
      color: #aeb3d0;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      appearance: none;
      border: 1px solid rgba(255,255,255,.14);
      color: #fff;
      background: rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 10px 14px;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    button:hover { background: rgba(255,255,255,.13); }

    code {
      color: #eef0ff;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 6px;
      padding: 1px 5px;
      font-size: .92em;
    }

    @keyframes mapIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes drawRoute {
      to { stroke-dashoffset: 0; }
    }

    @keyframes logoIn {
      0% { opacity: 0; transform: translate(-50%, 14px) scale(.96); }
      100% { opacity: 1; transform: translate(-50%, 0) scale(1); }
    }

    @keyframes haloIn {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.78); }
      100% { opacity: .75; transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes pulsePoint {
      0% { opacity: 0; r: 12; }
      24% { opacity: .9; }
      100% { opacity: 0; r: 95; }
    }

    .is-replaying .map-stage,
    .is-replaying .route-active,
    .is-replaying .destination-pulse,
    .is-replaying .brand,
    .is-replaying .brand-halo {
      animation: none !important;
    }

    @media (max-width: 780px) {
      body { align-items: start; }
      .demo { grid-template-columns: 1fr; justify-items: center; gap: 18px; }
      .caption { max-width: min(375px, 92vw); }
    }

    @media (prefers-reduced-motion: reduce) {
      .map-stage, .route-active, .brand, .brand-halo, .destination-pulse { animation-duration: 1ms !important; animation-delay: 1ms !important; }
      .route-dot { display: none; }
    }
  </style>
</head>

    <aside class="caption">
      <h1>Splash PS Mob</h1>
      <p>El mapa y el trayecto están dentro del mismo SVG. Eso evita el problema de que la ruta “flote” fuera de la calle.</p>
      <p>Para enganchar la app, escuchar el evento <code>psmob:splash-complete</code>. Para probar de nuevo: <code>window.replayPSMobSplash()</code>.</p>
      <div class="controls">
        <button type="button" id="replayBtn">Reproducir de nuevo</button>
        <button type="button" id="slowBtn">Modo lento</button>
      </div>
    </aside>
  </main>

  <script>
    const splash = document.getElementById('splash');
    const routePath = document.getElementById('routePath');
    const replayBtn = document.getElementById('replayBtn');
    const slowBtn = document.getElementById('slowBtn');

    // Animación muy breve: poca espera + dibujado rápido y fluido.
    const ROUTE_DELAY = 320;
    let isSlow = false;

    function setupRoute() {
      const length = routePath.getTotalLength();
      routePath.style.setProperty('--route-length', length);
      routePath.style.strokeDasharray = length;
      routePath.style.strokeDashoffset = length;
      return length;
    }

    function playSplash() {
      setupRoute();
      const duration = isSlow ? 1700 : 900;

      document.documentElement.style.setProperty('--route-delay', ROUTE_DELAY + 'ms');
      document.documentElement.style.setProperty('--route-duration', duration + 'ms');
      document.documentElement.style.setProperty('--logo-delay', (ROUTE_DELAY + duration - 120) + 'ms');
      // el pulso de destino aparece justo cuando la ruta llega al final
      document.documentElement.style.setProperty('--pulse-delay', (ROUTE_DELAY + duration - 80) + 'ms');

      splash.classList.remove('is-replaying');
      void splash.offsetWidth;

      window.setTimeout(() => {
        window.dispatchEvent(new CustomEvent('psmob:splash-complete'));
      }, ROUTE_DELAY + duration + 500);
    }

    window.replayPSMobSplash = function replayPSMobSplash() {
      splash.classList.add('is-replaying');
      void splash.offsetWidth;
      playSplash();
    };

    replayBtn.addEventListener('click', () => window.replayPSMobSplash());

    slowBtn.addEventListener('click', () => {
      isSlow = !isSlow;
      slowBtn.textContent = isSlow ? 'Velocidad normal' : 'Modo lento';
      window.replayPSMobSplash();
    });

    window.addEventListener('DOMContentLoaded', playSplash);
  </script>
