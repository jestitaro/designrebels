name: QuartzSales dashboard — Sync diario (LinkedIn + YouTube + competidores)

on:
  schedule:
    # Todos los días a las 09:00 UTC. El propio script decide qué grupo
    # (A/B/C) le toca sincronizar hoy — ver scripts/sync.js.
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      group:
        description: 'Grupo a sincronizar (auto = cadencia A/B/C del día, ALL = todos los competidores)'
        type: choice
        options:
          - auto
          - A
          - B
          - C
          - ALL
        default: auto

permissions:
  contents: write

jobs:
  sync:
    name: Apify + YouTube → data/dashboard-snapshot.json
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: projects/quartzsales-marketing-dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run sync
        run: node scripts/sync.js
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          SYNC_GROUP: ${{ github.event.inputs.group == 'auto' && '' || github.event.inputs.group }}

      - name: Commit data si cambió
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard-snapshot.json
          if git diff --cached --quiet; then
            echo "Sin cambios en data/dashboard-snapshot.json"
          else
            git commit -m "chore: sync daily dashboard snapshot"
            git push
          fi
